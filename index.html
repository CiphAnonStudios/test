<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f4f7fb;}
header{position:sticky;top:0;background:white;padding:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);}
header h2{margin:0;}
.container{max-width:500px;margin:auto;padding:15px;}
.card{background:white;border-radius:20px;padding:15px;margin-top:20px;box-shadow:0 8px 20px rgba(0,0,0,0.05);}
button{width:100%;padding:12px;border:none;border-radius:15px;background:#58cc02;color:white;font-size:1rem;font-weight:600;margin-top:10px;cursor:pointer;}
button:hover{background:#45a01f;}
input{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin-top:10px;}
.progress-bar{height:12px;background:#ddd;border-radius:10px;overflow:hidden;margin-top:5px;}
.progress-fill{height:100%;background:#58cc02;width:0%;}
.path{position:relative;margin-top:20px;}
.step{width:75px;height:75px;border-radius:50%;background:#e5e5e5;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1.2rem;position:relative;margin:40px auto;cursor:pointer;transition:0.3s;}
.completed{background:#58cc02;color:white;}
.current{background:#ffd93b;animation:pulse 1.5s infinite;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
</style>
</head>
<body>

<header>
<h2>My Workout Tracker</h2>
<p>XP: <span id="xp">0</span> | Streak: <span id="streak">0</span></p>
</header>

<div class="container">
<div class="card">
<h3>Create Your Workout Plan</h3>
<input id="exercise" placeholder="Exercise (Push-ups)">
<input id="sets" type="number" placeholder="Sets">
<input id="reps" type="number" placeholder="Reps">
<button onclick="savePlan()">Save Plan</button>
</div>

<div class="card">
<h3>Workout Path</h3>
<button onclick="startWorkout()">Start Workout</button>
<div id="path" class="path"></div>
</div>
</div>

<script>
let plan = JSON.parse(localStorage.getItem("plan")) || [];
let completed = parseInt(localStorage.getItem("completed")) || 0;
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastDate = localStorage.getItem("lastDate") || "";

// Daily reset
let today = new Date().toDateString();
if(lastDate !== today){
  completed = 0;
  lastDate = today;
  streak++;
  saveData();
}

// Save everything
function saveData(){
  localStorage.setItem("plan", JSON.stringify(plan));
  localStorage.setItem("completed", completed);
  localStorage.setItem("xp", xp);
  localStorage.setItem("streak", streak);
  localStorage.setItem("lastDate", lastDate);
}

// Save workout plan
function savePlan(){
  const ex = document.getElementById("exercise").value;
  const sets = parseInt(document.getElementById("sets").value);
  const reps = parseInt(document.getElementById("reps").value);
  if(!ex || !sets || !reps){alert("Fill all fields"); return;}
  plan = [];
  for(let i=0;i<sets;i++){plan.push({name:ex,reps:reps});}
  completed = 0;
  saveData();
  alert("Workout plan saved!");
  renderPath();
}

// Start workout
function startWorkout(){
  completed = 0;
  saveData();
  renderPath();
}

// Render path
function renderPath(){
  const pathDiv = document.getElementById("path");
  pathDiv.innerHTML = "";
  plan.forEach((p,i)=>{
    const div = document.createElement("div");
    div.classList.add("step");
    if(i<completed) div.classList.add("completed");
    else if(i===completed) div.classList.add("current");
    div.innerText = p.reps;
    div.onclick = ()=>{
      if(i===completed){
        completed++;
        xp+=10;
        saveData();
        renderPath();
        updateHeader();
      }
    };
    pathDiv.appendChild(div);
  });
}

function updateHeader(){
  document.getElementById("xp").innerText = xp;
  document.getElementById("streak").innerText = streak;
}

// Init
renderPath();
updateHeader();
</script>

</body>
</html>
