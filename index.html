<!-- loading.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepQuest Loading</title>
 <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<style>
 :root {
      --navy: #0B1F3F;
      --green: #00FF7F;
      --white: #FFFFFF;
      --light-navy: #132A5B;
    }
  body, html {
    margin: 0;
    height: 100%;
    background: var(--navy);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #logo {
    opacity: 0;
    width: 200px; /* starting size */
    transition: opacity 1s ease, transform 1s ease;
  }

  .green {
    filter: drop-shadow(0 0 15px #00ff00);
    transform: scale(1.2); /* makes logo bigger */
    opacity: 1;
  }
</style>
</head>
<body>
  <img id="logo" src="RepQuestLogo.png" alt="RepQuest Logo">

  <script>
    const logo = document.getElementById('logo');

    // Initial fade in
    setTimeout(() => {
      logo.style.opacity = 1;
    }, 100);

    // Fade to green, bigger, with glow
    setTimeout(() => {
      logo.src = 'RepQuestLogoGreen.png';
      logo.classList.add('green');
    }, 1500);

    // Redirect to home page
    setTimeout(() => {
      window.location.href = 'home.html';
    }, 3000);
  </script>
</body>
</html>
