<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:white;
}

/* CONTAINER */
.container{max-width:500px;margin:auto;padding:15px;}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  padding:10px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  font-size:0.9rem;
}

/* CALENDAR */
.calendar-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}

#calendar{
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:5px;
  margin-bottom:15px;
}

.day-name{
  font-size:0.6rem;
  opacity:0.6;
  text-align:center;
}

.day{
  aspect-ratio:1;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.7rem;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.2s;
}
.day:hover{transform:scale(1.05);}
.today{border:2px solid #22c55e;}
.done{background:#a855f7;color:white;font-weight:600;} /* Purple for today if done */
.completed{background:#22c55e;color:black;} /* Green for past completed days */

/* CARD */
.card{
  margin-top:15px;
  background:rgba(255,255,255,0.05);
  border-radius:25px;
  padding:20px;
  text-align:center;
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.37);
  transition:all 0.3s ease;
}

/* CIRCLE */
.circle{
  width:150px;
  height:150px;
  border-radius:50%;
  background:conic-gradient(#22c55e 0deg,#1e293b 0deg);
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.5s ease;
}

.inner{
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.2rem;
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.1);
}

/* TEXT */
.exercise{font-size:1.3rem;font-weight:600;transition:0.3s;}
.reps{opacity:0.7;transition:0.3s;}
.setinfo{opacity:0.6;font-size:0.8rem;transition:0.3s;}
.timer{font-size:2rem;margin-top:10px;}

/* BUTTON */
button{
  margin-top:10px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  background:#22c55e;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s ease;
}
button:hover{transform:scale(1.05);}
.secondary{background:#334155;color:white;}

/* FADE-IN ANIMATION */
.fade-in{animation:fadeIn 0.5s ease forwards;opacity:0;}
@keyframes fadeIn{to{opacity:1;}}

/* ACHIEVEMENT POPUP */
#achievementPopup{
  position:fixed;top:20%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:25px 35px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  font-weight:600;
  text-align:center;
  z-index:1000;
  transition:transform 0.3s ease;
}
#achievementPopup.show{transform:translate(-50%,-50%) scale(1);}
</style>
</head>

<body>
<div class="container">

<div class="top">
<div>XP: <span id="xp">0</span></div>
<div>Lvl: <span id="level">1</span></div>
<div>Streak: <span id="streak">0</span></div>
</div>

<!-- CALENDAR -->
<div class="calendar-header">
<div id="month"></div>
</div>
<div id="calendar"></div>

<!-- WORKOUT -->
<div class="card">
<div class="circle" id="circle">
<div class="inner" id="percent">0/100</div>
</div>

<div class="exercise" id="exercise">Ready?</div>
<div class="reps" id="reps"></div>
<div class="setinfo" id="setinfo"></div>

<div class="timer" id="timer"></div>

<button id="btn">Start</button>
<button class="secondary" id="resetBtn">Reset</button>
</div>

</div>

<!-- Achievement Popup -->
<div id="achievementPopup"></div>
<footer style="text-align:center;color:white;opacity:0.5;margin:15px;">Made by Theo</footer>

<!-- Confetti library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const workout=[
["Normal Push-ups",10],
["Wide Push-ups",10],
["Diamond Push-ups",10],
["Reverse Push-ups",10],
["Pike Push-ups",10],
["Decline Push-ups",10],
["Archer Push-ups",10],
["Explosive Push-ups",10],
["Spiderman Push-ups",10],
["Slow Push-ups",10]
];

let i=-1,totalReps=0,resting=false,timerInt;

// RESET localStorage automatically for a fresh start
localStorage.setItem("xp","0");
localStorage.setItem("completedDays",JSON.stringify({}));

// STORAGE
let xp=+localStorage.getItem("xp");
let completedDays=JSON.parse(localStorage.getItem("completedDays")||"{}");

// UI
const xpEl=document.getElementById("xp");
const levelEl=document.getElementById("level");
const streakEl=document.getElementById("streak");

const exercise=document.getElementById("exercise");
const reps=document.getElementById("reps");
const setinfo=document.getElementById("setinfo");
const timer=document.getElementById("timer");
const btn=document.getElementById("btn");
const resetBtn=document.getElementById("resetBtn");
const percent=document.getElementById("percent");
const circle=document.getElementById("circle");
const calendar=document.getElementById("calendar");

// STATS
function updateStats(){
  xpEl.innerText=xp;
  levelEl.innerText=Math.floor(xp/100)+1;
  streakEl.innerText=Object.keys(completedDays).length;
}

// CIRCLE
function updateCircle(){
  let p=totalReps/100;
  circle.style.background=`conic-gradient(#22c55e ${p*360}deg,#1e293b ${p*360}deg)`;
  percent.innerText=totalReps+"/100";
}

// RENDER
function render(){
  if(i<0){
    exercise.innerText="Ready?";
    reps.innerText="";
    setinfo.innerText="";
    updateCircle();
    return;
  }

  if(i>=workout.length){
    exercise.innerText="Complete";
    btn.disabled=true;

    xp+=50;
    localStorage.setItem("xp",xp);

    // Save today's count
    let today=new Date().toISOString().split("T")[0];
    completedDays[today]=(completedDays[today]||0)+1;
    localStorage.setItem("completedDays",JSON.stringify(completedDays));

    renderCalendar();
    updateStats();
    showAchievement("🎉 Completed 100 Push-ups Today!");
    return;
  }

  exercise.innerText=workout[i][0];
  reps.innerText=workout[i][1]+" reps";
  setinfo.innerText=`Set ${i+1}/10`;
  updateCircle();
  animateElements();
}

// REST
function rest(){
  let t=45;
  resting=true;
  btn.disabled=true;

  timerInt=setInterval(()=>{
    timer.innerText=t+"s";
    t--;
    if(t<0){
      clearInterval(timerInt);
      timer.innerText="";
      resting=false;
      btn.disabled=false;
    }
  },1000);
}

// ANIMATION
function animateElements(){
  [exercise,reps,setinfo,percent].forEach(el=>{
    el.classList.remove('fade-in');
    void el.offsetWidth;
    el.classList.add('fade-in');
  });
}

// ACHIEVEMENT POPUP
function showAchievement(message){
  const popup=document.getElementById('achievementPopup');
  popup.innerText=message;
  popup.classList.add('show');

  confetti({
    particleCount:150,
    spread:70,
    origin:{y:0.6}
  });

  setTimeout(()=>{popup.classList.remove('show');},2500);
}

// FLOW
btn.onclick=()=>{
  if(resting) return;
  i++;
  if(i>0) totalReps+=workout[i-1][1];
  rest();
  render();
};

// RESET
resetBtn.onclick=()=>{
  i=-1;
  totalReps=0;
  btn.disabled=false;
  localStorage.setItem("xp","0");
  localStorage.setItem("completedDays",JSON.stringify({}));
  xp=0;
  completedDays={};
  render();
};

// CALENDAR
function renderCalendar(){
  calendar.innerHTML="";

  let now=new Date();
  let year=now.getFullYear();
  let month=now.getMonth();

  document.getElementById("month").innerText=
    now.toLocaleString("default",{month:"long"})+" "+year;

  let firstDay=new Date(year,month,1).getDay();
  let days=new Date(year,month+1,0).getDate();

  let names=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  names.forEach(n=>{
    let el=document.createElement("div");
    el.className="day-name";
    el.innerText=n;
    calendar.appendChild(el);
  });

  for(let i=0;i<firstDay;i++){
    calendar.appendChild(document.createElement("div"));
  }

  for(let d=1;d<=days;d++){
    let dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let div=document.createElement("div");
    div.className="day";

    let today=new Date();
    if(d===today.getDate() && completedDays[dateStr]){
      div.classList.add("done"); // today done = purple
    } else if(d===today.getDate()){
      div.classList.add("today");
    } else if(completedDays[dateStr]){
      div.classList.add("completed"); // past completed = green
    }

    div.innerText=completedDays[dateStr] || d;

    calendar.appendChild(div);
  }
}

// INIT
updateStats();
render();
renderCalendar();

});
</script>

</body>
</html>
