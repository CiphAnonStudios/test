<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepQuest Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  font-size:0.9rem;
  opacity:0.9;
}

/* MAIN */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:30px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  transition:0.4s;
}

/* EXERCISE */
.exercise{
  font-size:1.6rem;
  font-weight:600;
  margin-bottom:10px;
}

.reps{
  font-size:1.1rem;
  opacity:0.7;
}

/* BUTTON */
button{
  margin-top:20px;
  padding:15px;
  width:100%;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:black;
  font-weight:600;
  font-size:1rem;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.96);
}

/* TIMER */
.timer{
  font-size:2rem;
  margin-top:15px;
}

/* CIRCLE PROGRESS */
.circle{
  width:160px;
  height:160px;
  border-radius:50%;
  background:conic-gradient(#22c55e 0deg,#1e293b 0deg);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:20px auto;
  transition:0.4s;
}

.inner{
  width:130px;
  height:130px;
  border-radius:50%;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.2rem;
}

/* GLOW ANIMATION */
.active{
  box-shadow:0 0 30px rgba(34,197,94,0.7);
}
</style>
</head>

<body>

<div class="header">
<div>XP: <span id="xp">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>Streak: <span id="streak">0</span></div>
</div>

<div class="container">

<div class="card" id="card">
<div class="circle" id="circle">
<div class="inner" id="progressText">Start</div>
</div>

<div class="exercise" id="exercise">Ready?</div>
<div class="reps" id="reps"></div>

<div class="timer" id="timer"></div>

<button id="btn" onclick="next()">Start Workout</button>
</div>

</div>

<script>
const workout=[
["Normal Push-ups",10],
["Wide Push-ups",10],
["Diamond Push-ups",10],
["Pike Push-ups",10],
["Decline Push-ups",10],
["Archer Push-ups",10],
["Explosive Push-ups",10],
["Spiderman Push-ups",10],
["Slow Tempo Push-ups",10]
];

let i=-1,resting=false,timerInt;

let xp=+localStorage.xp||0;
let streak=+localStorage.streak||0;
let last=localStorage.last||"";

let today=new Date().toDateString();
if(last!==today){streak++;localStorage.last=today;}

function updateStats(){
xp.innerText=xp;
level.innerText=Math.floor(xp/100)+1;
streak.innerText=streak;
}

function updateCircle(){
let percent=(i+1)/workout.length;
let deg=percent*360;
circle.style.background=`conic-gradient(#22c55e ${deg}deg,#1e293b ${deg}deg)`;
progressText.innerText=Math.round(percent*100)+"%";
}

function render(){
if(i<0){
exercise.innerText="Ready?";
reps.innerText="";
return;
}

if(i>=workout.length){
exercise.innerText="Workout Complete";
reps.innerText="";
btn.disabled=true;
xp+=50;
localStorage.xp=xp;
updateStats();
progressText.innerText="100%";
return;
}

exercise.innerText=workout[i][0];
reps.innerText=workout[i][1]+" reps";

card.classList.add("active");
setTimeout(()=>card.classList.remove("active"),300);

updateCircle();
}

function rest(){
let t=45;
resting=true;
btn.disabled=true;

timerInt=setInterval(()=>{
timer.innerText=t+"s rest";
t--;

if(t<0){
clearInterval(timerInt);
timer.innerText="";
resting=false;
btn.disabled=false;
}
},1000);
}

function next(){
if(resting) return;

i++;

if(i>0) rest();

render();
}

updateStats();
render();
</script>

</body>
</html>
